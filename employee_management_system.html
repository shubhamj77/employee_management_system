<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2433;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #2dd4a0;
    --red: #f75f5f;
    --amber: #f5a623;
    --text: #e8ecf4;
    --muted: #6b7899;
    --muted2: #8a96b8;
    --badge-sales: #1e3a2a; --badge-sales-t: #2dd4a0;
    --badge-it: #1a2e4a; --badge-it-t: #4f8ef7;
    --badge-hr: #2e1e3a; --badge-hr-t: #b06ef7;
    --badge-fin: #3a2e1a; --badge-fin-t: #f5a623;
    --badge-mkt: #3a1e2a; --badge-mkt-t: #f75f9f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .header-stats { display: flex; gap: 24px; }
  .hstat { text-align: right; }
  .hstat-val { font-size: 15px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }
  .hstat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  main { display: grid; grid-template-columns: 260px 1fr; flex: 1; gap: 0; }

  /* Sidebar */
  aside { background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 6px; }
  .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 0 8px; margin: 12px 0 4px; }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; border: none; background: transparent; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 13.5px; cursor: pointer; width: 100%; text-align: left; transition: all 0.15s; }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: rgba(79,142,247,0.12); color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .dept-badge { margin-left: auto; font-size: 11px; font-family: 'DM Mono', monospace; background: var(--surface2); padding: 2px 7px; border-radius: 20px; color: var(--muted); }

  /* Content area */
  .content { padding: 1.5rem 2rem; overflow: auto; }

  /* Stats cards */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .stat-card.blue .stat-value { color: var(--accent); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.purple .stat-value { color: #b06ef7; }
  .stat-card.amber .stat-value { color: var(--amber); }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 1rem; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px 9px 36px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13.5px; outline: none; transition: border 0.15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
  select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }
  .btn { padding: 9px 16px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7de8; }
  .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--muted2); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(247,95,95,0.12); border: 1px solid rgba(247,95,95,0.2); color: var(--red); }
  .btn-danger:hover { background: rgba(247,95,95,0.2); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th { padding: 10px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 500; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  th .sort-icon { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  td { padding: 11px 16px; font-size: 13.5px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .emp-id { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .emp-name { font-weight: 500; }
  .emp-age { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted2); }
  .salary { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--green); }
  .dept-tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 500; }
  .dept-Sales { background: var(--badge-sales); color: var(--badge-sales-t); }
  .dept-IT { background: var(--badge-it); color: var(--badge-it-t); }
  .dept-HR { background: var(--badge-hr); color: var(--badge-hr-t); }
  .dept-Finance { background: var(--badge-fin); color: var(--badge-fin-t); }
  .dept-Marketing { background: var(--badge-mkt); color: var(--badge-mkt-t); }

  .action-btns { display: flex; gap: 6px; }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.del:hover { border-color: var(--red); color: var(--red); }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }
  .page-btns { display: flex; gap: 4px; }
  .page-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; color: var(--muted2); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .page-btn:hover, .page-btn.active { background: rgba(79,142,247,0.12); border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 440px; max-width: 95vw; padding: 2rem; }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
  .form-row { margin-bottom: 1rem; }
  .form-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .error-msg { font-size: 11px; color: var(--red); margin-top: 4px; display: none; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13.5px; color: var(--text); z-index: 300; display: flex; align-items: center; gap: 10px; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success .toast-dot { background: var(--green); }
  .toast.error .toast-dot { background: var(--red); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Empty */
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 1rem; }
  .empty-state p { font-size: 14px; }

  /* View: Analytics */
  .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--muted2); margin-bottom: 1rem; }
  .bar-group { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: var(--muted2); width: 80px; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s; }
  .bar-val { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; width: 70px; text-align: right; flex-shrink: 0; }

  /* Responsive */
  @media(max-width: 900px) {
    main { grid-template-columns: 1fr; }
    aside { display: none; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .analytics-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="logo-dot"></span>
      EMS — Employee Management System
    </div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-val" id="hTotal">500</div>
        <div class="hstat-label">Total</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="hAvgSal">—</div>
        <div class="hstat-label">Avg Salary</div>
      </div>
    </div>
  </header>

  <main>
    <aside>
      <div class="nav-label">Views</div>
      <button class="nav-btn active" onclick="switchView('employees')" id="nav-employees">
        <span class="nav-icon">👥</span> All Employees
        <span class="dept-badge" id="sideTotal">500</span>
      </button>
      <button class="nav-btn" onclick="switchView('analytics')" id="nav-analytics">
        <span class="nav-icon">📊</span> Analytics
      </button>

      <div class="nav-label">Filter by Dept</div>
      <button class="nav-btn" onclick="filterByDept('')" id="dept-All">
        <span class="nav-icon">🏢</span> All Departments
      </button>
      <button class="nav-btn" onclick="filterByDept('IT')" id="dept-IT">
        <span class="nav-icon">💻</span> IT
        <span class="dept-badge" id="cnt-IT">—</span>
      </button>
      <button class="nav-btn" onclick="filterByDept('Sales')" id="dept-Sales">
        <span class="nav-icon">📈</span> Sales
        <span class="dept-badge" id="cnt-Sales">—</span>
      </button>
      <button class="nav-btn" onclick="filterByDept('HR')" id="dept-HR">
        <span class="nav-icon">🤝</span> HR
        <span class="dept-badge" id="cnt-HR">—</span>
      </button>
      <button class="nav-btn" onclick="filterByDept('Finance')" id="dept-Finance">
        <span class="nav-icon">💰</span> Finance
        <span class="dept-badge" id="cnt-Finance">—</span>
      </button>
      <button class="nav-btn" onclick="filterByDept('Marketing')" id="dept-Marketing">
        <span class="nav-icon">📣</span> Marketing
        <span class="dept-badge" id="cnt-Marketing">—</span>
      </button>
    </aside>

    <div class="content" id="mainContent">
      <!-- Injected by JS -->
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="empModal">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Add Employee</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-row">
      <label class="form-label">Employee ID</label>
      <input class="form-input" id="fId" type="number" placeholder="Auto-generated" />
      <div class="error-msg" id="errId">ID already exists</div>
    </div>
    <div class="form-row">
      <label class="form-label">Full Name</label>
      <input class="form-input" id="fName" placeholder="e.g. Priya Kumar" />
      <div class="error-msg" id="errName">Name is required</div>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label class="form-label">Age</label>
        <input class="form-input" id="fAge" type="number" min="18" max="65" placeholder="22–60" />
        <div class="error-msg" id="errAge">Age must be 18–65</div>
      </div>
      <div class="form-row" style="margin:0">
        <label class="form-label">Department</label>
        <select class="form-input" id="fDept">
          <option value="">Select...</option>
          <option>IT</option><option>Sales</option><option>HR</option>
          <option>Finance</option><option>Marketing</option>
        </select>
        <div class="error-msg" id="errDept">Select a department</div>
      </div>
    </div>
    <div class="form-row" style="margin-top:12px">
      <label class="form-label">Salary (₹)</label>
      <input class="form-input" id="fSalary" type="number" min="10000" placeholder="e.g. 45000" />
      <div class="error-msg" id="errSal">Enter a valid salary</div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal" style="max-width:380px">
    <div class="modal-title">Confirm Delete</div>
    <p style="color:var(--muted2);font-size:14px;margin-bottom:1.5rem">This will permanently remove <strong id="delName" style="color:var(--text)"></strong> (ID: <span id="delId" style="font-family:'DM Mono',monospace"></span>) from records.</p>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeDelModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-dot"></span>
  <span id="toastMsg"></span>
</div>

function fmt(n) { return '₹' + n.toLocaleString('en-IN'); }
function fmtK(n) { return '₹' + (n/1000).toFixed(1) + 'K'; }

function getFiltered() {
  let d = employees;
  if (currentDeptFilter) d = d.filter(e => e.department === currentDeptFilter);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    d = d.filter(e => e.name.toLowerCase().includes(q) || String(e.id).includes(q) || e.department.toLowerCase().includes(q));
  }
  d = [...d].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  return d;
}

function updateHeader() {
  const total = employees.length;
  const avg = Math.round(employees.reduce((s, e) => s + e.salary, 0) / total);
  document.getElementById('hTotal').textContent = total;
  document.getElementById('hAvgSal').textContent = fmtK(avg);
  document.getElementById('sideTotal').textContent = total;
  ['IT','Sales','HR','Finance','Marketing'].forEach(d => {
    const el = document.getElementById('cnt-' + d);
    if (el) el.textContent = employees.filter(e => e.department === d).length;
  });
}

}

  else render();
  document.querySelectorAll('.nav-btn[id^="dept-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('dept-' + (d || 'All')).classList.add('active');
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  render();
}

function render() {
  if (currentView === 'analytics') { renderAnalytics(); return; }
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (page > totalPages) page = totalPages;
  const slice = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  const avgSal = employees.length ? Math.round(employees.reduce((s,e) => s+e.salary, 0) / employees.length) : 0;
  const maxSal = employees.length ? Math.max(...employees.map(e => e.salary)) : 0;
  const depts = [...new Set(employees.map(e => e.department))].length;

  const si = col => {
    const arrow = sortCol === col ? (sortDir === 1 ? '↑' : '↓') : '↕';
    return `<span class="sort-icon">${arrow}</span>`;
  };

  document.getElementById('mainContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label">Total Employees</div>
        <div class="stat-value">${employees.length}</div>
        <div class="stat-sub">${depts} departments</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Average Salary</div>
        <div class="stat-value">${fmtK(avgSal)}</div>
        <div class="stat-sub">per employee</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Highest Salary</div>
        <div class="stat-value">${fmtK(maxSal)}</div>
        <div class="stat-sub">${employees.find(e=>e.salary===maxSal)?.name||''}</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Showing</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">${currentDeptFilter || 'All departments'}</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name, ID or department…" value="${searchQ}" oninput="onSearch(this.value)" />
      </div>
      <select onchange="filterByDept(this.value)" id="deptSelect">
        <option value="" ${!currentDeptFilter?'selected':''}>All Departments</option>
        <option value="IT" ${currentDeptFilter==='IT'?'selected':''}>IT</option>
        <option value="Sales" ${currentDeptFilter==='Sales'?'selected':''}>Sales</option>
        <option value="HR" ${currentDeptFilter==='HR'?'selected':''}>HR</option>
        <option value="Finance" ${currentDeptFilter==='Finance'?'selected':''}>Finance</option>
        <option value="Marketing" ${currentDeptFilter==='Marketing'?'selected':''}>Marketing</option>
      </select>
      <button class="btn btn-primary" onclick="openAddModal()">＋ Add Employee</button>
    </div>
    <div class="table-wrap">
      ${slice.length === 0 ? `<div class="empty-state"><div class="icon">🔍</div><p>No employees found</p></div>` : `
      <table>
        <thead><tr>
          <th onclick="sortBy('id')" class="${sortCol==='id'?'sorted':''}">ID ${si('id')}</th>
          <th onclick="sortBy('name')" class="${sortCol==='name'?'sorted':''}">Name ${si('name')}</th>
          <th onclick="sortBy('age')" class="${sortCol==='age'?'sorted':''}">Age ${si('age')}</th>
          <th onclick="sortBy('department')" class="${sortCol==='department'?'sorted':''}">Department ${si('department')}</th>
          <th onclick="sortBy('salary')" class="${sortCol==='salary'?'sorted':''}">Salary ${si('salary')}</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>${slice.map(e => `
          <tr>
            <td><span class="emp-id">#${e.id}</span></td>
            <td><span class="emp-name">${e.name}</span></td>
            <td><span class="emp-age">${e.age}</span></td>
            <td><span class="dept-tag dept-${e.department}">${e.department}</span></td>
            <td><span class="salary">${fmt(e.salary)}</span></td>
            <td><div class="action-btns">
              <button class="icon-btn" onclick="openEditModal(${e.id})" title="Edit">✏️</button>
              <button class="icon-btn del" onclick="openDelModal(${e.id})" title="Delete">🗑️</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <span>Showing ${((page-1)*PAGE_SIZE)+1}–${Math.min(page*PAGE_SIZE, total)} of ${total}</span>
        <div class="page-btns">
          <button class="page-btn" onclick="goPage(1)" ${page===1?'disabled':''}>«</button>
          <button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>
          ${Array.from({length: Math.min(5, totalPages)}, (_,i) => {
            let p = Math.max(1, Math.min(page - 2 + i, totalPages - 4 + i));
            p = Math.max(1, Math.min(p, totalPages));
            return `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
          }).join('')}
          <button class="page-btn" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>›</button>
          <button class="page-btn" onclick="goPage(${totalPages})" ${page===totalPages?'disabled':''}>»</button>
        </div>
      </div>`}
    </div>
  `;
}

function renderAnalytics() {
  const depts = ['IT','Sales','HR','Finance','Marketing'];
  const colors = { IT: '#4f8ef7', Sales: '#2dd4a0', HR: '#b06ef7', Finance: '#f5a623', Marketing: '#f75f9f' };
  const dCounts = {}, dSalaries = {};
  depts.forEach(d => { dCounts[d] = 0; dSalaries[d] = 0; });
  employees.forEach(e => { dCounts[e.department]++; dSalaries[e.department] += e.salary; });
  const maxCount = Math.max(...Object.values(dCounts));
  const maxAvgSal = Math.max(...depts.map(d => dSalaries[d] / dCounts[d]));

  const ageGroups = { '22-25': 0, '26-30': 0, '31-35': 0, '36-40': 0 };
  employees.forEach(e => {
    if (e.age <= 25) ageGroups['22-25']++;
    else if (e.age <= 30) ageGroups['26-30']++;
    else if (e.age <= 35) ageGroups['31-35']++;
    else ageGroups['36-40']++;
  });
  const maxAge = Math.max(...Object.values(ageGroups));

  const salBrackets = { '<25K': 0, '25–35K': 0, '35–45K': 0, '45–55K': 0, '>55K': 0 };
  employees.forEach(e => {
    if (e.salary < 25000) salBrackets['<25K']++;
    else if (e.salary < 35000) salBrackets['25–35K']++;
    else if (e.salary < 45000) salBrackets['35–45K']++;
    else if (e.salary < 55000) salBrackets['45–55K']++;
    else salBrackets['>55K']++;
  });
  const maxSalB = Math.max(...Object.values(salBrackets));

  document.getElementById('mainContent').innerHTML = `
    <div class="stats-grid" style="margin-bottom:1.5rem">
      <div class="stat-card blue"><div class="stat-label">Total Employees</div><div class="stat-value">${employees.length}</div></div>
      <div class="stat-card green"><div class="stat-label">Avg Salary</div><div class="stat-value">${fmtK(Math.round(employees.reduce((s,e)=>s+e.salary,0)/employees.length))}</div></div>
      <div class="stat-card purple"><div class="stat-label">Avg Age</div><div class="stat-value">${(employees.reduce((s,e)=>s+e.age,0)/employees.length).toFixed(1)}</div></div>
      <div class="stat-card amber"><div class="stat-label">Departments</div><div class="stat-value">5</div></div>
    </div>
    <div class="analytics-grid">
      <div class="chart-card">
        <div class="chart-title">Headcount by Department</div>
        <div class="bar-group">${depts.map(d => `
          <div class="bar-row">
            <span class="bar-label">${d}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(dCounts[d]/maxCount*100).toFixed(1)}%;background:${colors[d]}"></div></div>
            <span class="bar-val">${dCounts[d]}</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Avg Salary by Department</div>
        <div class="bar-group">${depts.map(d => {
          const avg = dSalaries[d] / dCounts[d];
          return `<div class="bar-row">
            <span class="bar-label">${d}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(avg/maxAvgSal*100).toFixed(1)}%;background:${colors[d]}"></div></div>
            <span class="bar-val">${fmtK(Math.round(avg))}</span>
          </div>`;}).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Age Distribution</div>
        <div class="bar-group">${Object.entries(ageGroups).map(([k,v]) => `
          <div class="bar-row">
            <span class="bar-label">${k}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(v/maxAge*100).toFixed(1)}%;background:#4f8ef7"></div></div>
            <span class="bar-val">${v}</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Salary Distribution</div>
        <div class="bar-group">${Object.entries(salBrackets).map(([k,v]) => `
          <div class="bar-row">
            <span class="bar-label">${k}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${(v/maxSalB*100).toFixed(1)}%;background:#2dd4a0"></div></div>
            <span class="bar-val">${v}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function onSearch(v) { searchQ = v; page = 1; render(); }
function goPage(p) { page = p; render(); }

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Employee';
  document.getElementById('modalSaveBtn').textContent = 'Save Employee';
  const nextId = Math.max(...employees.map(e => e.id)) + 1;
  document.getElementById('fId').value = nextId;
  document.getElementById('fId').readOnly = false;
  document.getElementById('fName').value = '';
  document.getElementById('fAge').value = '';
  document.getElementById('fDept').value = '';
  document.getElementById('fSalary').value = '';
  clearErrors();
  document.getElementById('empModal').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const e = employees.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = 'Edit Employee';
  document.getElementById('modalSaveBtn').textContent = 'Update Employee';
  document.getElementById('fId').value = e.id;
  document.getElementById('fId').readOnly = true;
  document.getElementById('fName').value = e.name;
  document.getElementById('fAge').value = e.age;
  document.getElementById('fDept').value = e.department;
  document.getElementById('fSalary').value = e.salary;
  clearErrors();
  document.getElementById('empModal').classList.add('open');
}

function closeModal() { document.getElementById('empModal').classList.remove('open'); }

function clearErrors() {
  ['Id','Name','Age','Dept','Sal'].forEach(f => {
    const el = document.getElementById('err'+f);
    if (el) el.style.display = 'none';
  });
}

function saveEmployee() {
  clearErrors();
  const id = parseInt(document.getElementById('fId').value);
  const name = document.getElementById('fName').value.trim();
  const age = parseInt(document.getElementById('fAge').value);
  const dept = document.getElementById('fDept').value;
  const salary = parseInt(document.getElementById('fSalary').value);
  let valid = true;
  if (!editingId && employees.find(e => e.id === id)) {
    document.getElementById('errId').style.display = 'block'; valid = false;
  }
  if (!name) { document.getElementById('errName').style.display = 'block'; valid = false; }
  if (!age || age < 18 || age > 65) { document.getElementById('errAge').style.display = 'block'; valid = false; }
  if (!dept) { document.getElementById('errDept').style.display = 'block'; valid = false; }
  if (!salary || salary < 10000) { document.getElementById('errSal').style.display = 'block'; valid = false; }
  if (!valid) return;
  if (editingId) {
    const idx = employees.findIndex(e => e.id === editingId);
    employees[idx] = { id, name, age, department: dept, salary };
    toast('Employee updated successfully', 'success');
  } else {
    employees.push({ id, name, age, department: dept, salary });
    toast('Employee added successfully', 'success');
  }
  closeModal();
  updateHeader();
  render();
}

function openDelModal(id) {
  deleteTarget = id;
  const e = employees.find(x => x.id === id);
  document.getElementById('delName').textContent = e.name;
  document.getElementById('delId').textContent = e.id;
  document.getElementById('delModal').classList.add('open');
}
function closeDelModal() { document.getElementById('delModal').classList.remove('open'); }
function confirmDelete() {
  employees = employees.filter(e => e.id !== deleteTarget);
  closeDelModal();
  toast('Employee deleted', 'error');
  updateHeader();
  render();
}

let toastTimer;
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = 'toast ' + type;
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
updateHeader();
render();
</script>
</body>
</html>
